services:
  - type: web
    name: enterprise-api
    runtime: python3
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_ORIGIN
        value: https://your-firebase-domain.web.app
      - key: SQLSERVER_DATABASE
        value: HUMAN
      - key: SQLSERVER_SERVER
        value: your-sqlserver-instance
      - key: USE_TRUSTED_CONNECTION
        value: true
      - key: MYSQL_HOST
        value: your-mysql-host
      - key: MYSQL_PORT
        value: 3306
      - key: MYSQL_DATABASE
        value: PAYROLL
      - key: MYSQL_USER
        value: your-mysql-user
      - key: MYSQL_PASSWORD
        value: your-mysql-password
      - key: ENABLE_TEST_FAILURE_HOOKS
        value: false
